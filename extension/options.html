<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Recall — Settings</title>
  <style>
    body {
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 420px;
      margin: 40px auto;
      color: #1a1a2e;
      padding: 0 16px;
    }
    h1 { font-size: 18px; margin-bottom: 4px; }
    p.muted { color: #777; font-size: 13px; }
    label { display: block; font-weight: 600; margin: 20px 0 6px; font-size: 13px; }
    input[type="text"] {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font: inherit;
      box-sizing: border-box;
    }
    button {
      margin-top: 14px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 16px;
      font: 600 13px/1 inherit;
      cursor: pointer;
    }
    button:hover { background: #4338ca; }
    #result { margin-top: 12px; font-size: 13px; }
    .ok { color: #16a34a; }
    .err { color: #dc2626; }
  </style>
</head>
<body>
  <h1>Recall — Settings</h1>
  <p class="muted">
    Point this at your PC hub's address — e.g. <code>http://192.168.1.42:8000</code>
    if your laptop and the hub are on the same demo hotspot, or
    <code>http://localhost:8000</code> if the hub runs on this machine.
  </p>

  <label for="hub-url">Hub URL</label>
  <input type="text" id="hub-url" placeholder="http://localhost:8000" />

  <label for="github-token">GitHub token (optional)</label>
  <input type="text" id="github-token" placeholder="ghp_… (only needed for private repos / higher rate limits)" />

  <button id="save">Save &amp; test connection</button>
  <div id="result"></div>

  <script src="options.js"></script>
</body>
</html>
