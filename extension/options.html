<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Recall — Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #12100c;
      --surface: #1b1812;
      --surface2:#221e16;
      --line:    #332d21;
      --ink:     #ece7db;
      --muted:   #a39b8a;
      --amber:   #f0a030;
      --amber-dim:rgba(240,160,48,.1);
      --amber-border:rgba(240,160,48,.25);
      --green:   #57c87b;
      --red:     #e8837c;
      --mono:    "Cascadia Code","SF Mono",Consolas,ui-monospace,monospace;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font: 13px/1.6 var(--mono);
      min-height: 100vh;
      padding: 0;
    }

    .page {
      max-width: 480px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    /* header */
    .page-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }
    .logo-mark {
      width: 34px; height: 34px;
      border-radius: 9px;
      background: var(--amber-dim);
      border: 1px solid var(--amber-border);
      display: flex; align-items: center; justify-content: center;
      flex: none;
    }
    .page-title { font-size: 17px; font-weight: 700; letter-spacing: .02em; }
    .page-title span { color: var(--amber); }
    .page-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* field groups */
    .field-group {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 14px;
    }
    .field-label {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .field-hint {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .field-hint code {
      color: var(--amber);
      background: var(--amber-dim);
      border: 1px solid var(--amber-border);
      border-radius: 4px;
      padding: 1px 5px;
      font: inherit;
    }

    input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 9px 11px;
      font: 13px/1 var(--mono);
      color: var(--ink);
      outline: none;
      transition: border-color .15s;
      caret-color: var(--amber);
    }
    input[type="text"]::placeholder { color: #5a5244; }
    input[type="text"]:focus {
      border-color: var(--amber-border);
      box-shadow: 0 0 0 3px rgba(240,160,48,.08);
    }

    /* action row */
    .action-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
    }

    button.primary {
      background: var(--amber);
      color: var(--bg);
      border: none;
      border-radius: 7px;
      padding: 9px 18px;
      font: 700 12px/1 var(--mono);
      cursor: pointer;
      letter-spacing: .04em;
      transition: opacity .15s;
    }
    button.primary:hover { opacity: .85; }
    button.primary:disabled { opacity: .4; cursor: default; }

    /* result badge */
    #result {
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 7px;
      display: none;
    }
    #result.ok {
      display: block;
      color: var(--green);
      background: rgba(87,200,123,.08);
      border: 1px solid rgba(87,200,123,.2);
    }
    #result.err {
      display: block;
      color: var(--red);
      background: rgba(232,131,124,.08);
      border: 1px solid rgba(232,131,124,.2);
    }
    #result.testing {
      display: block;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--line);
    }
  </style>
</head>
<body>
  <div class="page">

    <div class="page-header">
      <div class="logo-mark">
        <svg width="18" height="18" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="2.5" fill="#f0a030"/>
          <circle cx="2" cy="4"  r="1.2" fill="#a39b8a" opacity=".7"/>
          <circle cx="12" cy="4" r="1.2" fill="#a39b8a" opacity=".7"/>
          <circle cx="2" cy="10" r="1.2" fill="#a39b8a" opacity=".7"/>
          <circle cx="12" cy="10" r="1.2" fill="#a39b8a" opacity=".7"/>
          <line x1="4.5" y1="5.5"  x2="7"  y2="7"   stroke="#f0a030" stroke-width=".8" opacity=".5"/>
          <line x1="9.5" y1="5.5"  x2="7"  y2="7"   stroke="#f0a030" stroke-width=".8" opacity=".5"/>
          <line x1="4.5" y1="8.5"  x2="7"  y2="7"   stroke="#f0a030" stroke-width=".8" opacity=".5"/>
          <line x1="9.5" y1="8.5"  x2="7"  y2="7"   stroke="#f0a030" stroke-width=".8" opacity=".5"/>
        </svg>
      </div>
      <div>
        <div class="page-title">Re<span>call</span> — settings</div>
        <div class="page-sub">extension configuration</div>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label" for="hub-url">hub address</label>
      <p class="field-hint">
        The PC hub's network address. Use <code>http://localhost:8000</code> if the hub
        runs on this machine, or <code>http://192.168.x.x:8000</code> on a demo hotspot.
      </p>
      <input type="text" id="hub-url" placeholder="http://localhost:8000" />
    </div>

    <div class="field-group">
      <label class="field-label" for="github-token">GitHub token <span style="color:#5a5244;font-size:10px;text-transform:none;letter-spacing:0">(optional)</span></label>
      <p class="field-hint">
        Only needed for private repos or to raise API rate limits. Generate one at
        <code>github.com/settings/tokens</code> with <code>repo</code> scope.
      </p>
      <input type="text" id="github-token" placeholder="ghp_…" />
    </div>

    <div class="action-row">
      <button class="primary" id="save">save &amp; test</button>
      <div id="result"></div>
    </div>

  </div>
  <script src="options.js"></script>
</body>
</html>
