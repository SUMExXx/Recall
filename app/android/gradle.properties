org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
# Kotlin incremental compilation crashes when the pub cache (C:) and this
# project (D:) are on different drives — its cache path converter can't make a
# relative path across Windows drive roots. Non-incremental builds avoid it.
kotlin.incremental=false
